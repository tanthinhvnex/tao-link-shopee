<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APTeam - Trang chủ</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #fdf6f0 0%, #f5e6d3 50%, #eddcc8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        h1 {
            color: #5d4e37;
            font-size: 2rem;
            margin-bottom: 2rem;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-width: 400px;
            margin: 0 auto;
        }
        a {
            display: block;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, #d4a574, #c9956c);
            color: white;
            text-decoration: none;
            border-radius: 0.5rem;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(212, 165, 116, 0.4);
        }
        a:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 165, 116, 0.6);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>APTeam</h1>
        <div class="links">
            <a href="/tao-link-shopee/">
                🛍️ Tạo Link Shopee với Voucher 25%
            </a>
        </div>
    </div>
</body>
</html>
