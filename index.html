    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        // ==================== CẤU HÌNH ====================
        const CONFIG = {
            affiliateId: "17352620178",
            subId: "product----",
            // Thay bằng URL Worker của bạn sau khi deploy
            workerUrl: "https://shopee-link-resolver.tanthinhvnex.workers.dev"
        };

        // ==================== TOAST NOTIFICATION ====================
        const Toast = Swal.mixin({
            toast: true,
            position: 'top-end',
            showConfirmButton: false,
            timer: 2000,
            timerProgressBar: true
        });

        function showToast(msg, icon = 'success') {
            Toast.fire({ icon, title: msg });
        }

        // ==================== CLIPBOARD ====================
        function copyToClipboard(text) {
            if (!text) {
                showToast('Không có nội dung để copy', 'info');
                return;
            }

            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text)
                    .then(() => showToast('Đã copy!'))
                    .catch(() => showToast('Copy thất bại', 'error'));
            } else {
                const temp = document.createElement('textarea');
                temp.value = text;
                document.body.appendChild(temp);
                temp.select();
                try {
                    document.execCommand('copy') ? showToast('Đã copy!') : showToast('Copy thất bại', 'error');
                } finally {
                    document.body.removeChild(temp);
                }
            }
        }

        // ==================== SHOPEE URL PROCESSOR ====================

        // Kiểm tra có phải short link không
        function isShortLink(url) {
            try {
                const urlObj = new URL(url);
                const host = urlObj.hostname.toLowerCase();

                // Short link hosts
                if (host === 'vn.shp.ee' || host === 'shp.ee') {
                    return true;
                }

                // s.shopee.vn với path ngắn (không phải /an_redir)
                if (host === 's.shopee.vn' && !urlObj.pathname.includes('/an_redir')) {
                    return true;
                }

                return false;
            } catch {
                return false;
            }
        }

        // Kiểm tra có phải URL Shopee hợp lệ
        function isValidShopeeUrl(url) {
            try {
                const urlObj = new URL(url);
                const host = urlObj.hostname.toLowerCase();
                const validHosts = ['shopee.vn', 'vn.shp.ee', 'shp.ee', 's.shopee.vn'];
                return validHosts.some(h => host === h || host.endsWith('.' + h));
            } catch {
                return false;
            }
        }

        // Extract shop_id và item_id từ URL
        function extractProductIds(url) {
            try {
                const urlObj = new URL(url);
                const path = urlObj.pathname;

                // Pattern 1: /product/{shop_id}/{item_id}
                const productMatch = path.match(/\/product\/(\d+)\/(\d+)/);
                if (productMatch) {
                    return { shopId: productMatch[1], itemId: productMatch[2] };
                }

                // Pattern 2: SEO URL ending with -i.{shop_id}.{item_id}
                const seoMatch = path.match(/-i\.(\d+)\.(\d+)/);
                if (seoMatch) {
                    return { shopId: seoMatch[1], itemId: seoMatch[2] };
                }

                return null;
            } catch {
                return null;
            }
        }

        // Build canonical product URL (sạch, không có tracking params)
        function buildCanonicalUrl(shopId, itemId) {
            return `https://shopee.vn/product/${shopId}/${itemId}`;
        }

        // Build affiliate URL
        function buildAffiliateUrl(canonicalUrl) {
            const encodedUrl = encodeURIComponent(canonicalUrl);
            return `https://s.shopee.vn/an_redir?origin_link=${encodedUrl}&affiliate_id=${CONFIG.affiliateId}&sub_id=${CONFIG.subId}`;
        }

        // Extract product IDs từ HTML response
        function extractProductIdsFromHtml(html) {
            // Tìm pattern shop_id và item_id trong HTML
            const patterns = [
                // Pattern trong JSON data
                /"shopid"\s*:\s*(\d+).*?"itemid"\s*:\s*(\d+)/i,
                /"itemid"\s*:\s*(\d+).*?"shopid"\s*:\s*(\d+)/i,
                // Pattern trong URL
                /\/product\/(\d+)\/(\d+)/,
                /-i\.(\d+)\.(\d+)/,
                // Pattern trong meta tags
                /shop_id[=:](\d+).*?item_id[=:](\d+)/i,
                /item_id[=:](\d+).*?shop_id[=:](\d+)/i,
            ];

            for (const pattern of patterns) {
                const match = html.match(pattern);
                if (match) {
                    // Xác định thứ tự shop_id và item_id
                    if (pattern.source.includes('itemid.*shopid') || pattern.source.includes('item_id.*shop_id')) {
                        return { shopId: match[2], itemId: match[1] };
                    }
                    return { shopId: match[1], itemId: match[2] };
                }
            }

            return null;
        }

        // Fetch với timeout
        async function fetchWithTimeout(url, options = {}, timeout = 8000) {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), timeout);

            try {
                const response = await fetch(url, {
                    ...options,
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                return response;
            } catch (error) {
                clearTimeout(timeoutId);
                throw error;
            }
        }

        // Extract URL từ HTML response
        function extractUrlFromHtml(html) {
            // Method 1: Tìm og:url meta tag
            const ogUrlMatch = html.match(/property=["']og:url["']\s+content=["']([^"']+)["']/i) ||
                              html.match(/content=["']([^"']+)["']\s+property=["']og:url["']/i);
            if (ogUrlMatch && ogUrlMatch[1].includes('shopee.vn')) {
                return ogUrlMatch[1];
            }

            // Method 2: Tìm canonical link
            const canonicalMatch = html.match(/rel=["']canonical["']\s+href=["']([^"']+)["']/i) ||
                                  html.match(/href=["']([^"']+)["']\s+rel=["']canonical["']/i);
            if (canonicalMatch && canonicalMatch[1].includes('shopee.vn')) {
                return canonicalMatch[1];
            }

            // Method 3: Tìm product URL trực tiếp trong HTML
            const productUrlMatch = html.match(/https?:\/\/shopee\.vn\/[^\s"'<>]*-i\.\d+\.\d+/i) ||
                                   html.match(/https?:\/\/shopee\.vn\/product\/\d+\/\d+/i);
            if (productUrlMatch) {
                return productUrlMatch[0];
            }

            // Method 4: Extract IDs từ HTML và build URL
            const ids = extractProductIdsFromHtml(html);
            if (ids) {
                return `https://shopee.vn/product/${ids.shopId}/${ids.itemId}`;
            }

            return null;
        }

        // Hiển thị popup hướng dẫn resolve short link thủ công
        async function showManualResolvePopup(shortUrl) {
            const result = await Swal.fire({
                title: 'Cần xử lý link ngắn',
                html: `
                    <div style="text-align: left; font-size: 14px;">
                        <p><b>Link ngắn không thể tự động xử lý.</b></p>
                        <p>Vui lòng làm theo các bước sau:</p>
                        <ol style="padding-left: 20px; margin: 10px 0;">
                            <li>Nhấn nút <b>"Mở Link"</b> bên dưới</li>
                            <li>Đợi trang Shopee load xong</li>
                            <li>Copy <b>link đầy đủ</b> từ thanh địa chỉ trình duyệt</li>
                            <li>Quay lại đây và dán link mới</li>
                        </ol>
                    </div>
                `,
                icon: 'info',
                showCancelButton: true,
                confirmButtonText: '<i class="fas fa-external-link-alt"></i> Mở Link',
                cancelButtonText: 'Đóng',
                confirmButtonColor: '#ee4d2d'
            });

            if (result.isConfirmed) {
                window.open(shortUrl, '_blank');
            }
            return null;
        }

        // Resolve short link bằng Worker API hoặc CORS proxy
        async function resolveShortLink(shortUrl) {
            // Ưu tiên dùng Worker API nếu đã cấu hình
            if (CONFIG.workerUrl) {
                try {
                    console.log('Using Worker API:', CONFIG.workerUrl);
                    const apiUrl = `${CONFIG.workerUrl}?url=${encodeURIComponent(shortUrl)}`;
                    const response = await fetchWithTimeout(apiUrl, {
                        method: 'GET'
                    }, 10000);

                    if (response.ok) {
                        const data = await response.json();
                        if (data.success && data.canonicalUrl) {
                            console.log('Worker resolved:', data.canonicalUrl);
                            return data.canonicalUrl;
                        }
                    }
                    console.log('Worker failed, falling back to proxies');
                } catch (error) {
                    console.log('Worker error:', error.message);
                }
            }

            // Fallback: Thử các CORS proxy
            const proxies = [
                `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(shortUrl)}`,
                `https://api.allorigins.win/raw?url=${encodeURIComponent(shortUrl)}`,
                `https://corsproxy.io/?${encodeURIComponent(shortUrl)}`
            ];

            const fetchPromises = proxies.map(async (proxyUrl) => {
                try {
                    console.log('Trying proxy:', proxyUrl);
                    const response = await fetchWithTimeout(proxyUrl, {
                        method: 'GET',
                        redirect: 'follow'
                    }, 6000);

                    if (!response.ok) return null;

                    const html = await response.text();
                    if (!html || html.length < 100) return null;

                    const foundUrl = extractUrlFromHtml(html);
                    if (foundUrl) {
                        console.log('Found URL:', foundUrl);
                        return foundUrl;
                    }
                    return null;
                } catch (error) {
                    console.log('Proxy failed:', proxyUrl, error.message);
                    return null;
                }
            });

            const results = await Promise.all(fetchPromises);
            const validResult = results.find(r => r !== null);

            if (validResult) {
                return validResult;
            }

            // Nếu tất cả fail, hiển thị popup hướng dẫn
            await showManualResolvePopup(shortUrl);
            throw new Error('Vui lòng dán link đầy đủ từ trang sản phẩm Shopee (link có dạng shopee.vn/...)');
        }

        // Main function: Xử lý URL và tạo affiliate link
        async function processShopeeUrl(inputUrl) {
            let workingUrl = inputUrl.trim();

            // Validate URL cơ bản
            try {
                new URL(workingUrl);
            } catch {
                throw new Error('URL không hợp lệ!');
            }

            // Kiểm tra có phải Shopee URL không
            if (!isValidShopeeUrl(workingUrl)) {
                throw new Error('URL không phải link Shopee!');
            }

            // Bước 1: Resolve short link nếu cần
            if (isShortLink(workingUrl)) {
                showToast('Đang xử lý short link...', 'info');
                workingUrl = await resolveShortLink(workingUrl);
            }

            // Bước 2: Extract product IDs
            const ids = extractProductIds(workingUrl);
            if (!ids) {
                throw new Error('URL không phải link sản phẩm Shopee hợp lệ. Vui lòng dán link trang sản phẩm.');
            }

            // Bước 3: Build canonical URL
            const canonicalUrl = buildCanonicalUrl(ids.shopId, ids.itemId);

            // Bước 4 & 5: Build affiliate URL
            const affiliateUrl = buildAffiliateUrl(canonicalUrl);

            return {
                affiliateUrl,
                canonicalUrl,
                shopId: ids.shopId,
                itemId: ids.itemId
            };
        }

        // ==================== UI HELPERS ====================
        function setLoading(isLoading) {
            $('#btnSubmit').prop('disabled', isLoading);
            if (isLoading) {
                $('.btn-text').text('Đang xử lý...');
                $('.spinner').addClass('show');
            } else {
                $('.btn-text').text('Tạo Link Ngay');
                $('.spinner').removeClass('show');
            }
        }

        function showResult(affiliateLink) {
            $('#affiliate-links-container').html(`
                <button class="btn-copy-main copy-btn" data-link="${affiliateLink}">
                    <i class="fas fa-check-circle mr-2"></i>✅ Link đã gắn vouchers FB<br>Bấm để copy và paste vào bài viết
                </button>
            `);
            $('#result-section').addClass('show');

            $('html, body').animate({
                scrollTop: $('#result-section').offset().top - 15
            }, 400);
        }

        // ==================== EVENT HANDLERS ====================
        $('#link-form').on('submit', async function(e) {
            e.preventDefault();

            const url = $('#input_url').val().trim();
            if (!url) {
                showToast('Vui lòng nhập link Shopee!', 'warning');
                return;
            }

            setLoading(true);
            $('#result-section').removeClass('show');

            try {
                const result = await processShopeeUrl(url);
                showResult(result.affiliateUrl);
                showToast('Tạo link thành công!');
            } catch (error) {
                showToast(error.message, 'error');
            } finally {
                setLoading(false);
            }
        });

        $(document).on('click', '.copy-btn', function() {
            const link = $(this).data('link');
            copyToClipboard(link);
        });
    </script>

            if (f.fbq) return;
            n = f.fbq = function() {
